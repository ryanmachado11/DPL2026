<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Você Ganhou!</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #00c853, #1b5e20);
            font-family: Arial, sans-serif;
            color: white;
            text-align: center;
        }

        .container {
            background: rgba(255, 255, 255, 0.1);
            padding: 50px;
            border-radius: 20px;
            box-shadow: 0 0 30px rgba(255, 255, 255, 0.3);
            backdrop-filter: blur(10px);
        }

        .trofeu {
            font-size: 80px;
            margin-bottom: 20px;
        }

        h1 {
            font-size: 4rem;
            margin-bottom: 15px;
            color: #ffeb3b;
        }

        p {
            font-size: 1.5rem;
            margin-bottom: 25px;
        }

        .btn {
            display: inline-block;
            padding: 15px 30px;
            background: #ffeb3b;
            color: #000;
            text-decoration: none;
            font-weight: bold;
            border-radius: 10px;
            transition: 0.3s;
        }

        .btn:hover {
            transform: scale(1.05);
            background: #fff176;
        }

        .confete {
            position: fixed;
            top: -10px;
            width: 10px;
            height: 10px;
            animation: cair 4s linear infinite;
        }

        @keyframes cair {
            from {
                transform: translateY(-10px) rotate(0deg);
            }
            to {
                transform: translateY(110vh) rotate(720deg);
            }
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="trofeu">🏆</div>
        <h1>PARABÉNS!</h1>
        <p>Você acertou o número sorteado!</p>
        <p>🎉 Vitória incrível! 🎉</p>
        <a href="/" class="btn">Jogar Novamente</a>
    </div>

    <script>
        const cores = ["#ffeb3b", "#ff4081", "#40c4ff", "#69f0ae", "#ff9100"];

        for (let i = 0; i < 100; i++) {
            const confete = document.createElement("div");
            confete.classList.add("confete");

            confete.style.left = Math.random() * 100 + "vw";
            confete.style.backgroundColor =
                cores[Math.floor(Math.random() * cores.length)];

            confete.style.animationDuration =
                (Math.random() * 3 + 2) + "s";

            document.body.appendChild(confete);
        }
    </script>

</body>
</html>
