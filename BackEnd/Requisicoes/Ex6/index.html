<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Jogo de Adivinhação</title>
  <style>
    body {
      height: 100vh;
      margin: 0;
      background-color: rgb(0, 122, 179);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-family: Arial, sans-serif;
      color: rgb(255, 255, 255);
    }
    input {
      padding: 10px;
      font-size: 1em;
      border: none;
      border-radius: 5px;
      width: 150px;
    }
    button {
      padding: 10px 20px;
      font-size: 1em;
      color: rgb(80, 80, 80);
      border: none;
      border-radius: 5px;
      cursor: pointer;
    }
    #resultado {
      font-size: 1.2em;
      font-weight: bold;
    }
  </style>
</head>
<body>
  <input type="number" id="inputValue" min="1" max="100" placeholder="Digite um número">
  <button onclick="enviar()">Enviar</button>
  <div id="resultado"></div>

  <script>
    function enviar() {
      const valor = document.getElementById('inputValue').value;
      
      if (!valor) {
        alert('Por favor, digite um número!');
        return;
      }
      
      fetch(`/guess?Enviar=${valor}`)
        .then(response => response.text())
        .then(data => {
          let mensagem = '';
          
          if (data === 'maior') {
            mensagem = 'É MAIOR';
          } else if (data === 'menor') {
            mensagem = 'É MENOR';
          } else if (data === 'igual') {
            mensagem = 'ACERTOU!';
          }
          
          document.getElementById('resultado').textContent = mensagem;
          document.getElementById('inputValue').value = '';
          document.getElementById('inputValue').focus();
        })
        .catch(error => console.error('Erro:', error));
    }

    document.getElementById('inputValue').focus();
  </script>
</body>
</html>
