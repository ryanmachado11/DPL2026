<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Exercício 5</title>
  <style>
    body {
      height: 100%;
      margin: 0;
      background-color: white;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }
  </style>
</head>
<body>
  <input type="text" id="inputValue" size="15">
  <button id="btnEnviar">Enviar</button>
  <div id="resultado" style="margin-top:10px; font-weight:600;"></div>

  <script>
    async function enviar() {
      const valor = document.getElementById('inputValue').value;
      const resultadoEl = document.getElementById('resultado');
      resultadoEl.textContent = 'Carregando...';
      try {
        const resp = await fetch(`/guess?Enviar=${encodeURIComponent(valor)}`);
        const text = await resp.text();
        resultadoEl.textContent = text;
      } catch (err) {
        resultadoEl.textContent = 'Erro: ' + err.message;
      }
    }

    document.getElementById('btnEnviar').addEventListener('click', enviar);
  </script>
</body>
</html>
